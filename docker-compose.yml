version: '3.8'

services:
  audio_backend:
    build: .
    container_name: audio_backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    restart: always

  audio_frontend:
    build: .
    container_name: audio_frontend
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8502:8501"
    environment:
      # 前端容器内部请求后端的地址 (通过 Docker 内网)
      - API_BASE_URL=http://audio_backend:8000/api
      # 写死公网地址 (后端暴露的 8002 端口)
      - PUBLIC_BASE_URL=http://106.54.14.120:8002
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    depends_on:
      - audio_backend
    restart: always
