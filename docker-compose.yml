version: '3.8'

services:
  audio_backend:
    build: .
    container_name: audio_backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    restart: always

  audio_frontend:
    build: .
    container_name: audio_frontend
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # 前端容器内部请求后端的地址 (通过 Docker 内网)
      - API_BASE_URL=http://audio_backend:8000/api
      # 用户浏览器下载文件时的请求地址 (需要填你云服务器的公网 IP 或域名)
      # 如果没填，代码里默认回退到 http://localhost:8000
      - PUBLIC_BASE_URL=http://localhost:8000
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    depends_on:
      - audio_backend
    restart: always
